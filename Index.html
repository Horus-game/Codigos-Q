<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Códigos GLP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#e8e8e8;min-height:100vh;padding-bottom:20px}
.topbar{background:#1a3a5c;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:16px;font-weight:600}
.refresh-btn{background:#2a5f9e;border:none;border-radius:6px;color:white;padding:8px 14px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600}
.ultimo{text-align:center;font-size:11px;color:#888;padding:6px;background:#f0f0f0}
.search-wrap{padding:12px 16px;background:white;border-bottom:1px solid #e0e0e0;position:sticky;top:56px;z-index:9}
.search-input{width:100%;padding:10px 14px;font-size:15px;border:2px solid #e0e0e0;border-radius:8px;font-family:inherit;outline:none;transition:border-color .2s}
.search-input:focus{border-color:#1a3a5c}
.search-clear{position:absolute;right:28px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#aaa;display:none}
.search-wrap{position:relative}

.tabs{display:flex;gap:6px;padding:10px 16px;background:white;border-bottom:1px solid #e0e0e0}
.tab{background:#f0f0f0;border:none;border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;color:#555}
.tab.active{background:#1a3a5c;color:white}

.contador{text-align:center;font-size:11px;color:#888;padding:6px 0}

.lista{padding:0 16px}
.item{background:white;border-radius:8px;margin-bottom:6px;padding:12px 14px;display:flex;align-items:center;gap:12px;border:1px solid #e0e0e0;transition:background .15s}
.item:hover{background:#f9fafb}
.item.highlight{border-color:#1a3a5c;background:#f0f5ff}
.codigo{font-family:monospace;font-size:13px;font-weight:700;background:#1a3a5c;color:white;padding:4px 10px;border-radius:6px;white-space:nowrap;min-width:80px;text-align:center}
.codigo.q{background:#854f0b;color:#fef3c7}
.significado{font-size:13px;color:#374151;flex:1}
.badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;margin-left:6px}
.badge-alfa{background:#dbeafe;color:#1e3a8a}
.badge-q{background:#fef3c7;color:#854f0b}
.empty{text-align:center;padding:40px;color:#bbb;font-size:14px}
.loading{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
</style>
</head>
<body>

<div class="topbar">
  <h1>📻 Códigos GLP</h1>
  <button class="refresh-btn" onclick="cargar()">↻</button>
</div>
<div class="ultimo" id="ultimo">Cargando...</div>

<div class="search-wrap">
  <input class="search-input" id="buscar" type="text" placeholder="🔍 Buscar código o significado..." oninput="filtrar()" autocomplete="off"/>
  <button class="search-clear" id="btnClear" onclick="limpiar()">✕</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTipo('todos',this)">Todos</button>
  <button class="tab" onclick="setTipo('alfa',this)">Alfa / Numéricos</button>
  <button class="tab" onclick="setTipo('q',this)">Códigos Q</button>
</div>

<div class="contador" id="contador"></div>
<div class="lista" id="lista"><div class="loading">Cargando datos...</div></div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbw_RsATMTzGqEJ_cHjX2zzEiXdKaPXqedZRAxZBQjjda-C-vrLrVVHoRKVGbyvjZQNQSA/exec';
var datos = [];
var tipoActivo = 'todos';

window.handleData = function(d){
  datos = d.codigos || [];
  filtrar();
  document.getElementById('ultimo').textContent = 'Última actualización: ' + new Date().toLocaleTimeString('es-AR');
};

function cargar(){
  document.getElementById('ultimo').textContent = 'Actualizando...';
  var old = document.getElementById('jsonp-script');
  if(old) old.parentNode.removeChild(old);
  var s = document.createElement('script');
  s.id = 'jsonp-script';
  s.src = API + '?callback=handleData&_=' + Date.now();
  s.onerror = function(){
    document.getElementById('ultimo').textContent = 'Error de conexión';
    document.getElementById('lista').innerHTML = '<div class="empty">Error al cargar datos</div>';
  };
  document.head.appendChild(s);
}

function setTipo(t, btn){
  tipoActivo = t;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  filtrar();
}

function limpiar(){
  document.getElementById('buscar').value = '';
  document.getElementById('btnClear').style.display = 'none';
  filtrar();
}

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filtrar(){
  var q = document.getElementById('buscar').value.trim().toLowerCase();
  document.getElementById('btnClear').style.display = q ? 'block' : 'none';

  var lista = datos.filter(function(item){
    if(tipoActivo !== 'todos' && item.tipo !== tipoActivo) return false;
    if(!q) return true;
    return item.codigo.toLowerCase().indexOf(q) >= 0 ||
           item.significado.toLowerCase().indexOf(q) >= 0;
  });

  document.getElementById('contador').textContent = lista.length + ' código' + (lista.length !== 1 ? 's' : '');

  if(!lista.length){
    document.getElementById('lista').innerHTML = '<div class="empty">No se encontraron resultados</div>';
    return;
  }

  document.getElementById('lista').innerHTML = lista.map(function(item){
    var hl = q.length > 0;
    var codHtml = esc(item.codigo);
    var sigHtml = esc(item.significado);

    // Resaltar coincidencias
    if(hl){
      var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
      codHtml = codHtml.replace(re, '<mark style="background:#fde68a;border-radius:2px">$1</mark>');
      sigHtml = sigHtml.replace(re, '<mark style="background:#fde68a;border-radius:2px">$1</mark>');
    }

    return '<div class="item' + (hl ? ' highlight' : '') + '">'
      + '<span class="codigo ' + item.tipo + '">' + codHtml + '</span>'
      + '<span class="significado">' + sigHtml
      + '<span class="badge badge-' + item.tipo + '">' + (item.tipo === 'q' ? 'Código Q' : 'Alfa') + '</span>'
      + '</span>'
      + '</div>';
  }).join('');
}

cargar();
</script>
</body>
</html>
